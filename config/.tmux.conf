# ════════════════════════════════════════════════════════════════════════════
# tmux 配置文件
# ════════════════════════════════════════════════════════════════════════════
# 符号说明: C=Ctrl, M=Alt, S=Shift
# 常用命令:
#   tmux ls                     # 列出会话
#   tmux attach -t <name>       # 连接会话
#   tmux detach                 # 断开会话 (prefix + d)
#   tmux kill-session -t <name> # 删除会话
# ════════════════════════════════════════════════════════════════════════════

# ────────────────────────────────────────────────────────────────────────────
# 基础设置
# ────────────────────────────────────────────────────────────────────────────
set -g default-shell /bin/zsh                  # 默认 shell
set -g default-terminal 'tmux-256color'        # 终端颜色支持

# 索引从 1 开始 (更符合键盘布局)
set -g base-index 1
set -g pane-base-index 1

# 行为设置
set -g mouse on                                # 启用鼠标
set -g renumber-windows on                     # 关闭窗口后重新编号
set -g allow-rename off                        # 禁止程序自动重命名窗口
set -g set-clipboard on                        # 启用剪贴板支持
set -g history-limit 50000                     # 历史记录行数

# ────────────────────────────────────────────────────────────────────────────
# Prefix 键
# ────────────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a                              # prefix 改为 Ctrl-a
bind C-a send-prefix                           # 按两次 C-a 发送到嵌套程序

# ────────────────────────────────────────────────────────────────────────────
# 状态栏
# ────────────────────────────────────────────────────────────────────────────
set -g status-bg black
set -g status-left "#[fg=cyan,bold][#S] #[fg=green]#(tmux list-windows -F -a '#I:#W' | paste -sd ' ' -)"
set -g status-left-length 40
set -g status-right "#{prefix_highlight} #[fg=cyan]%Y-%m-%d %H:%M"
set -g window-status-format "#[fg=cyan]#I:#W#[default]"
set -g window-status-current-format "#[fg=cyan,reverse,bold]#I:#W#[default]"

# Pane 边框显示编号
set -g pane-border-status top
set -g pane-border-format "#[bold] #{pane_index} "
set -g pane-border-indicators arrows
set -g pane-active-border-style 'fg=white bg=brightblack'

# ────────────────────────────────────────────────────────────────────────────
# 复制模式 (Vi 风格)
# ────────────────────────────────────────────────────────────────────────────
# 注: tmux-yank 插件已处理剪贴板，无需手动绑定
set-window-option -g mode-keys vi              # 使用 vi 按键
bind -T copy-mode-vi v send-keys -X begin-selection      # v 开始选择
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle   # Ctrl-v 块选择

# ────────────────────────────────────────────────────────────────────────────
# Pane 操作 (无需 prefix)
# ────────────────────────────────────────────────────────────────────────────
# 切换 pane: Alt + 方向键
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# 调整 pane 大小: Ctrl+Shift + 方向键
bind -n C-S-Left resize-pane -L 3
bind -n C-S-Right resize-pane -R 3
bind -n C-S-Down resize-pane -D 3
bind -n C-S-Up resize-pane -U 3

# 分屏: Alt + h/j (水平/垂直)
bind -n M-h split-window -h -c "#{pane_current_path}"
bind -n M-j split-window -v -c "#{pane_current_path}"

# 最大化/还原 pane: prefix + z
unbind z
bind z resize-pane -Z

# ────────────────────────────────────────────────────────────────────────────
# Window 操作 (无需 prefix)
# ────────────────────────────────────────────────────────────────────────────
# 新建/关闭窗口
bind -n M-c new-window -c "#{pane_current_path}"   # Alt + c 新建窗口
bind -n M-x confirm-before -y kill-pane            # Alt + x 关闭 pane (最后一个 pane 时关闭窗口)

# 窗口切换: Alt + q/p/n (最近/上一个/下一个)
bind -n M-q last-window
bind -n M-p previous-window
bind -n M-n next-window

# 窗口选择器: Alt + w
bind -n M-w choose-tree -w

# ────────────────────────────────────────────────────────────────────────────
# Session 操作 (需要 prefix)
# ────────────────────────────────────────────────────────────────────────────
bind t new-session                                  # prefix + t 新建会话
bind e setw synchronize-panes\; display-message "sync: #{?pane_synchronized,on,off}"  # toggle 同步输入

# ────────────────────────────────────────────────────────────────────────────
# 插件 (需要先安装 TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm)
# ────────────────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'              # 插件管理器
set -g @plugin 'tmux-plugins/tmux-sensible'    # 合理的默认设置

# 复制到系统剪贴板
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @shell_mode 'vi'
set -g @yank_with_mouse 'on'
set -g @yank_selection 'clipboard'
set -g @yank_highlight 'on'

# 状态栏显示模式提示 (Wait/Copy/Sync)
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_prefix_prompt 'Wait'
set -g @prefix_highlight_copy_prompt 'Copy'
set -g @prefix_highlight_sync_prompt 'Sync'

# 布局管理器
set -g @plugin 'jimeh/tmuxifier'

# 初始化 TPM (保持在此行最后)
run '~/.tmux/plugins/tpm/tpm'
